<section class="hero">
    @for (image of images; track image; let i = $index) {
        <div class="hero-slide" 
             [class.active]="i === activeIndex" 
             [style.background-image]="'url(\'' + image + '\')'"></div>
    }
    <div class="overlay"></div>
    <div class="container hero-content">
        <h1>Engineering <span class="green">Services</span></h1>
        <p class="subtitle">
            Providing high-efficiency mechanical, electrical, and plumbing engineering
            solutions for commercial and residential projects.
        </p>
        <div class="cta-buttons">
            <a routerLink="/" fragment="services" class="btn">View Services</a>
            <a routerLink="/about" class="btn btn-outline">About Us</a>
        </div>
    </div>
</section>
