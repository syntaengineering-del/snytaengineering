<section class="login-section">
    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <h2>Admin <span class="green">Login</span></h2>
                <p>Welcome back! Please enter your details.</p>
            </div>

            <form (submit)="onLogin()" #loginForm="ngForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" [(ngModel)]="email" name="email" required placeholder="admin@synta.com">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" [(ngModel)]="password" name="password" required placeholder="••••••••">
                </div>

                <div class="error-msg" *ngIf="error">{{ error }}</div>

                <button type="submit" class="btn login-btn" [disabled]="loading || !loginForm.valid">
                    {{ loading ? 'Signing in...' : 'Sign In' }}
                </button>
            </form>
        </div>
    </div>
</section>
